<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Canvas n8n sanitizado do Portal Visual</title>
  <desc id="description">Fluxo publicado que recebe um webhook, monta a biblioteca visual e responde o HTML do portal.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset=".55" stop-color="#101d32"/><stop offset="1" stop-color="#0b1322"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#1b2b45"/><stop offset="1" stop-color="#121e31"/></linearGradient>
    <linearGradient id="webhook" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ff6b74"/><stop offset="1" stop-color="#d7243b"/></linearGradient>
    <linearGradient id="code" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffce65"/><stop offset="1" stop-color="#d79222"/></linearGradient>
    <linearGradient id="respond" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#72c8ff"/><stop offset="1" stop-color="#277fc6"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000" flood-opacity=".38"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#8aa4c5" stroke-opacity=".09"/></pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto"><path d="M0 0 10 5 0 10z" fill="#88a7cc"/></marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect x="54" y="46" width="1492" height="116" rx="22" fill="#0d192a" stroke="#2b4669"/>
  <rect x="83" y="75" width="56" height="56" rx="16" fill="#ed3340"/>
  <path d="M102 116V90h11c11 0 17 5 17 14s-6 12-17 12zm11-10h4c3 0 5-1 5-3s-2-3-5-3h-4z" fill="#fff"/>
  <text x="164" y="93" fill="#79c7ff" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="800" letter-spacing="2">N8N · WORKFLOW PUBLICADO</text>
  <text x="164" y="124" fill="#f8fbff" font-family="Segoe UI,Arial,sans-serif" font-size="30" font-weight="800">Postagem Redes — Portal Visual</text>
  <g transform="translate(1193 78)"><rect width="318" height="52" rx="26" fill="#123c31" stroke="#2d9e79"/><circle cx="29" cy="26" r="7" fill="#53e6aa" filter="url(#glow)"/><text x="49" y="32" fill="#b8f4d9" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="750">PUBLICADO · PRODUÇÃO</text></g>
  <text x="83" y="205" fill="#9eb2cf" font-family="Segoe UI,Arial,sans-serif" font-size="17">Rota da LAN</text>
  <text x="83" y="234" fill="#edf4ff" font-family="Consolas,monospace" font-size="21">GET /webhook/postagem-redes</text>
  <text x="1516" y="234" fill="#8da4c2" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="16">3 nós · execução curta · resposta HTML</text>
  <path d="M447 465 H607" fill="none" stroke="#88a7cc" stroke-width="7" marker-end="url(#arrow)"/>
  <path d="M993 465 H1153" fill="none" stroke="#88a7cc" stroke-width="7" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="110" y="323" width="337" height="285" rx="26" fill="url(#panel)" stroke="#ff6070" stroke-width="2"/>
    <rect x="110" y="323" width="337" height="68" rx="26" fill="url(#webhook)"/>
    <rect x="110" y="365" width="337" height="26" fill="url(#webhook)"/>
    <circle cx="151" cy="357" r="17" fill="#fff" fill-opacity=".2"/><path d="M144 350h14v14h-14z" fill="#fff"/>
    <text x="181" y="363" fill="#fff" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="800">Webhook</text>
    <text x="143" y="438" fill="#f6f9ff" font-family="Segoe UI,Arial,sans-serif" font-size="25" font-weight="800">Receber acesso ao portal</text>
    <text x="143" y="477" fill="#9fb2ce" font-family="Segoe UI,Arial,sans-serif" font-size="17">GET · resposta via nó dedicado</text>
    <rect x="143" y="518" width="265" height="45" rx="10" fill="#0a1423" stroke="#304866"/><text x="161" y="547" fill="#c6d5e8" font-family="Consolas,monospace" font-size="16">/postagem-redes</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="607" y="274" width="386" height="383" rx="26" fill="url(#panel)" stroke="#f4bd49" stroke-width="2"/>
    <rect x="607" y="274" width="386" height="68" rx="26" fill="url(#code)"/><rect x="607" y="316" width="386" height="26" fill="url(#code)"/>
    <text x="640" y="316" fill="#332105" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="900">&lt;/&gt;</text>
    <text x="683" y="316" fill="#332105" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="850">Code v2</text>
    <text x="640" y="391" fill="#f6f9ff" font-family="Segoe UI,Arial,sans-serif" font-size="25" font-weight="800">Processar biblioteca e estado</text>
    <text x="640" y="431" fill="#a9bbd3" font-family="Segoe UI,Arial,sans-serif" font-size="17">Varre carrosséis · normaliza dados · monta HTML</text>
    <g font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="700"><rect x="640" y="478" width="142" height="40" rx="20" fill="#213850"/><text x="711" y="504" fill="#c9e4ff" text-anchor="middle">/files isolado</text><rect x="794" y="478" width="154" height="40" rx="20" fill="#213850"/><text x="871" y="504" fill="#c9e4ff" text-anchor="middle">ledger atômico</text></g>
    <rect x="640" y="550" width="320" height="66" rx="12" fill="#0a1423" stroke="#334a69"/><text x="660" y="579" fill="#6ed1a9" font-family="Consolas,monospace" font-size="15">return [{ json: { html } }]</text><text x="660" y="603" fill="#8295b0" font-family="Consolas,monospace" font-size="13">interface operacional pronta</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1153" y="323" width="337" height="285" rx="26" fill="url(#panel)" stroke="#5bb7f7" stroke-width="2"/>
    <rect x="1153" y="323" width="337" height="68" rx="26" fill="url(#respond)"/><rect x="1153" y="365" width="337" height="26" fill="url(#respond)"/>
    <path d="M1187 348h24v17h-14l-7 6v-6h-3z" fill="#fff"/><text x="1226" y="363" fill="#fff" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="800">Respond to Webhook</text>
    <text x="1186" y="438" fill="#f6f9ff" font-family="Segoe UI,Arial,sans-serif" font-size="25" font-weight="800">Entregar portal ao navegador</text>
    <text x="1186" y="477" fill="#9fb2ce" font-family="Segoe UI,Arial,sans-serif" font-size="17">HTML · UTF-8 · sem cache</text>
    <rect x="1186" y="518" width="265" height="45" rx="10" fill="#0a1423" stroke="#304866"/><text x="1204" y="547" fill="#c6d5e8" font-family="Consolas,monospace" font-size="16">Content-Type: text/html</text>
  </g>
  <g transform="translate(83 741)"><rect width="1434" height="92" rx="16" fill="#0b1728" stroke="#2b4566"/><circle cx="36" cy="46" r="12" fill="#53e6aa"/><text x="65" y="40" fill="#f2f7ff" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="800">Responsabilidade única:</text><text x="65" y="66" fill="#9eb3ce" font-family="Segoe UI,Arial,sans-serif" font-size="16">renderizar a central visual. Ações e arquivos são mantidos em webhooks separados para reduzir acoplamento e risco operacional.</text></g>
  <text x="1517" y="870" fill="#7086a3" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="13">EXPORT SANITIZADO PARA PORTFÓLIO · CREDENCIAIS E DADOS CORPORATIVOS REMOVIDOS</text>
</svg>
