<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Canvas n8n sanitizado da Fila e Roteador</title>
  <desc id="description">Fluxo de homologação que seleciona conteúdo aprovado, separa por rede e prepara idempotência antes dos publicadores.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#121d31"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#1d2d47"/><stop offset="1" stop-color="#122037"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="15" stdDeviation="14" flood-color="#000" flood-opacity=".38"/></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#8aa4c5" stroke-opacity=".09"/></pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto"><path d="M0 0 10 5 0 10z" fill="#8faed0"/></marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)"/>
  <rect x="54" y="44" width="1492" height="114" rx="22" fill="#0d192a" stroke="#2b4669"/>
  <rect x="83" y="73" width="56" height="56" rx="16" fill="#ed3340"/><text x="111" y="111" text-anchor="middle" fill="#fff" font-family="Segoe UI,Arial,sans-serif" font-size="28" font-weight="900">P</text>
  <text x="164" y="91" fill="#79c7ff" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="800" letter-spacing="2">N8N · PUBLICAÇÃO MULTICANAL</text><text x="164" y="123" fill="#f8fbff" font-family="Segoe UI,Arial,sans-serif" font-size="30" font-weight="800">Fila e roteador — homologação controlada</text>
  <g transform="translate(1168 76)"><rect width="342" height="52" rx="26" fill="#392b13" stroke="#ac7d28"/><circle cx="29" cy="26" r="7" fill="#ffd166"/><text x="49" y="32" fill="#ffe3a7" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="800">INATIVO · AGUARDA CREDENCIAIS</text></g>
  <text x="83" y="208" fill="#a7bad4" font-family="Segoe UI,Arial,sans-serif" font-size="17">Quando uma conta for homologada, este canvas não será refeito: apenas receberá a credencial n8n e os IDs da plataforma.</text>
  <path d="M288 403H364" stroke="#8faed0" stroke-width="6" marker-end="url(#arrow)"/><path d="M566 403H642" stroke="#8faed0" stroke-width="6" marker-end="url(#arrow)"/><path d="M844 403H920" stroke="#8faed0" stroke-width="6" marker-end="url(#arrow)"/><path d="M1122 403H1198" stroke="#8faed0" stroke-width="6" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)"><rect x="76" y="321" width="212" height="166" rx="20" fill="url(#panel)" stroke="#b277ff" stroke-width="2"/><rect x="76" y="321" width="212" height="52" rx="20" fill="#8254c4"/><text x="102" y="354" fill="#fff" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="800">SCHEDULE v1.3</text><text x="100" y="410" fill="#f7f9ff" font-family="Segoe UI,Arial,sans-serif" font-size="19" font-weight="800">A cada 5 min</text><text x="100" y="440" fill="#aabbd3" font-family="Segoe UI,Arial,sans-serif" font-size="14">+ teste manual</text></g>
  <g filter="url(#shadow)"><rect x="364" y="321" width="202" height="166" rx="20" fill="url(#panel)" stroke="#f2be53" stroke-width="2"/><rect x="364" y="321" width="202" height="52" rx="20" fill="#dc9b25"/><text x="389" y="354" fill="#392100" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="900">CODE v2</text><text x="388" y="410" fill="#f7f9ff" font-family="Segoe UI,Arial,sans-serif" font-size="19" font-weight="800">Ler fila</text><text x="388" y="439" fill="#aabbd3" font-family="Segoe UI,Arial,sans-serif" font-size="14">aprovado/agendado</text></g>
  <g filter="url(#shadow)"><rect x="642" y="321" width="202" height="166" rx="20" fill="url(#panel)" stroke="#40c7b2" stroke-width="2"/><rect x="642" y="321" width="202" height="52" rx="20" fill="#1e9c8d"/><text x="667" y="354" fill="#fff" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="800">LOOP v3</text><text x="666" y="410" fill="#f7f9ff" font-family="Segoe UI,Arial,sans-serif" font-size="19" font-weight="800">Um conteúdo</text><text x="666" y="439" fill="#aabbd3" font-family="Segoe UI,Arial,sans-serif" font-size="14">por execução</text></g>
  <g filter="url(#shadow)"><rect x="920" y="321" width="202" height="166" rx="20" fill="url(#panel)" stroke="#f2be53" stroke-width="2"/><rect x="920" y="321" width="202" height="52" rx="20" fill="#dc9b25"/><text x="945" y="354" fill="#392100" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="900">CODE v2</text><text x="944" y="410" fill="#f7f9ff" font-family="Segoe UI,Arial,sans-serif" font-size="19" font-weight="800">Separar redes</text><text x="944" y="439" fill="#aabbd3" font-family="Segoe UI,Arial,sans-serif" font-size="14">uma carga por canal</text></g>
  <g filter="url(#shadow)"><rect x="1198" y="321" width="324" height="166" rx="20" fill="url(#panel)" stroke="#6caeff" stroke-width="2"/><rect x="1198" y="321" width="324" height="52" rx="20" fill="#347fca"/><text x="1223" y="354" fill="#fff" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="800">SWITCH v3.4</text><text x="1222" y="410" fill="#f7f9ff" font-family="Segoe UI,Arial,sans-serif" font-size="19" font-weight="800">Roteador por rede</text><text x="1222" y="439" fill="#aabbd3" font-family="Segoe UI,Arial,sans-serif" font-size="14">Instagram · Facebook · LinkedIn · X</text></g>
  <path d="M1359 487V557" stroke="#8faed0" stroke-width="6" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)"><rect x="1075" y="559" width="569" height="159" rx="22" fill="#142941" stroke="#4e9fdf" stroke-width="2"/><rect x="1075" y="559" width="569" height="51" rx="22" fill="#246ba9"/><text x="1102" y="592" fill="#fff" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="800">CODE v2 · PONTO DE CONTROLE</text><text x="1102" y="647" fill="#f7f9ff" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="800">Registrar início com idempotência</text><text x="1102" y="680" fill="#abc0da" font-family="Segoe UI,Arial,sans-serif" font-size="15">Só marca como publicado após o ID remoto/permalink devolvido pela API.</text></g>
  <g transform="translate(76 574)"><rect width="865" height="144" rx="22" fill="#0c192b" stroke="#314d6f"/><text x="28" y="38" fill="#75c6ff" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="850" letter-spacing="1.4">GUARD-RAILS OPERACIONAIS</text><g font-family="Segoe UI,Arial,sans-serif" font-size="16"><circle cx="38" cy="72" r="7" fill="#53e6aa"/><text x="57" y="78" fill="#d9e8f8">não consome conteúdo pendente ou rejeitado</text><circle cx="38" cy="106" r="7" fill="#ffd166"/><text x="57" y="112" fill="#d9e8f8">mantém uma publicação por item/canal</text><circle cx="479" cy="72" r="7" fill="#70b8ff"/><text x="498" y="78" fill="#d9e8f8">separa falha de uma rede das demais</text><circle cx="479" cy="106" r="7" fill="#ff7b88"/><text x="498" y="112" fill="#d9e8f8">não publica sem OAuth/IDs homologados</text></g></g>
  <text x="1518" y="858" fill="#7189a7" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="13">CANVAS SANITIZADO PARA PORTFÓLIO · SEM TOKENS, CONTAS, IDENTIFICADORES OU DADOS CORPORATIVOS</text>
</svg>
