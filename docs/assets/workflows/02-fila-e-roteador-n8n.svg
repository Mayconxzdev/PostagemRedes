<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1020" viewBox="0 0 1600 1020" role="img" aria-labelledby="title description">
  <title id="title">Canvas n8n sanitizado do orquestrador de publicação</title>
  <desc id="description">Workflow Portal Ações com IA nativa em fallback, fila, ledger, publicação em Instagram, Facebook, LinkedIn e X, mais retry por entrega.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#121d31"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#1d2d47"/><stop offset="1" stop-color="#122037"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="13" stdDeviation="12" flood-color="#000" flood-opacity=".38"/></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#8aa4c5" stroke-opacity=".09"/></pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto"><path d="M0 0 10 5 0 10z" fill="#8faed0"/></marker>
    <style>
      .t{font-family:Segoe UI,Arial,sans-serif}.label{font-size:14px;font-weight:800;letter-spacing:.8px}.name{font-size:18px;font-weight:800}.sub{font-size:13px}.line{stroke:#8faed0;stroke-width:5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1600" height="1020" fill="url(#bg)"/><rect width="1600" height="1020" fill="url(#grid)"/>
  <rect x="48" y="38" width="1504" height="116" rx="22" fill="#0d192a" stroke="#2b4669"/>
  <rect x="76" y="67" width="58" height="58" rx="17" fill="#ed3340"/><text x="105" y="106" text-anchor="middle" fill="#fff" class="t" font-size="28" font-weight="900">P</text>
  <text x="160" y="86" fill="#79c7ff" class="t" font-size="16" font-weight="800" letter-spacing="2">N8N 2.27.3 · PORTAL: AÇÕES</text>
  <text x="160" y="119" fill="#f8fbff" class="t" font-size="30" font-weight="800">Orquestrador de publicação — IA, fila e quatro redes</text>
  <g transform="translate(1135 69)"><rect width="378" height="54" rx="27" fill="#392b13" stroke="#ac7d28"/><circle cx="29" cy="27" r="7" fill="#ffd166"/><text x="49" y="33" fill="#ffe3a7" class="t" font-size="15" font-weight="800">TRAVA GLOBAL · HOMOLOGAR ANTES DE PUBLICAR</text></g>

  <text x="76" y="206" fill="#75c6ff" class="t" font-size="15" font-weight="850" letter-spacing="1.5">CAMINHO 1 · AÇÃO HUMANA E SUGESTÃO DE IA</text>
  <path class="line" d="M270 310H334"/><path class="line" d="M536 310H600"/><path class="line" d="M794 310H858"/><path class="line" d="M1050 310H1114"/><path class="line" d="M1306 310H1370"/>
  <g filter="url(#shadow)"><rect x="76" y="244" width="194" height="134" rx="18" fill="url(#panel)" stroke="#7e9fc5"/><rect x="76" y="244" width="194" height="42" rx="18" fill="#3976b7"/><text x="98" y="271" class="t label" fill="#fff">WEBHOOK v2.1</text><text x="98" y="322" class="t name" fill="#fff">Portal</text><text x="98" y="348" class="t sub" fill="#afc4dd">salvar · upload · IA</text></g>
  <g filter="url(#shadow)"><rect x="334" y="244" width="202" height="134" rx="18" fill="url(#panel)" stroke="#f2be53"/><rect x="334" y="244" width="202" height="42" rx="18" fill="#dc9b25"/><text x="356" y="271" class="t label" fill="#392100">CODE v2</text><text x="356" y="322" class="t name" fill="#fff">Validar ação</text><text x="356" y="348" class="t sub" fill="#afc4dd">estado e auditoria</text></g>
  <g filter="url(#shadow)"><rect x="600" y="244" width="194" height="134" rx="18" fill="url(#panel)" stroke="#6caeff"/><rect x="600" y="244" width="194" height="42" rx="18" fill="#347fca"/><text x="622" y="271" class="t label" fill="#fff">SWITCH v3.4</text><text x="622" y="322" class="t name" fill="#fff">Roteador</text><text x="622" y="348" class="t sub" fill="#afc4dd">responder ou IA</text></g>
  <g filter="url(#shadow)"><rect x="858" y="244" width="192" height="134" rx="18" fill="url(#panel)" stroke="#45d6c2"/><rect x="858" y="244" width="192" height="42" rx="18" fill="#158a7e"/><text x="880" y="271" class="t label" fill="#fff">OPENAI v2.3</text><text x="880" y="322" class="t name" fill="#fff">Primário</text><text x="880" y="348" class="t sub" fill="#afc4dd">JSON estruturado</text></g>
  <g filter="url(#shadow)"><rect x="1114" y="244" width="192" height="134" rx="18" fill="url(#panel)" stroke="#b277ff"/><rect x="1114" y="244" width="192" height="42" rx="18" fill="#8254c4"/><text x="1136" y="271" class="t label" fill="#fff">GEMINI v1.2</text><text x="1136" y="322" class="t name" fill="#fff">Fallback</text><text x="1136" y="348" class="t sub" fill="#afc4dd">variável de guarda</text></g>
  <g filter="url(#shadow)"><rect x="1370" y="244" width="154" height="134" rx="18" fill="url(#panel)" stroke="#ea8f75"/><rect x="1370" y="244" width="154" height="42" rx="18" fill="#b85e42"/><text x="1392" y="271" class="t label" fill="#fff">OLLAMA v1</text><text x="1392" y="322" class="t name" fill="#fff">Local</text><text x="1392" y="348" class="t sub" fill="#afc4dd">último fallback</text></g>
  <text x="76" y="417" fill="#abc0da" class="t" font-size="15">A sugestão nunca substitui a legenda aprovada. A pessoa responsável revisa, edita e confirma no portal.</text>

  <text x="76" y="490" fill="#75c6ff" class="t" font-size="15" font-weight="850" letter-spacing="1.5">CAMINHO 2 · FILA RESILIENTE E LEDGER NATIVO</text>
  <path class="line" d="M252 595H306"/><path class="line" d="M506 595H560"/><path class="line" d="M760 595H814"/><path class="line" d="M1014 595H1068"/>
  <g filter="url(#shadow)"><rect x="76" y="530" width="176" height="130" rx="18" fill="url(#panel)" stroke="#b277ff"/><rect x="76" y="530" width="176" height="42" rx="18" fill="#8254c4"/><text x="98" y="557" class="t label" fill="#fff">SCHEDULE v1.3</text><text x="98" y="607" class="t name" fill="#fff">5 minutos</text><text x="98" y="633" class="t sub" fill="#afc4dd">gatilho seguro</text></g>
  <g filter="url(#shadow)"><rect x="306" y="530" width="200" height="130" rx="18" fill="url(#panel)" stroke="#40c7b2"/><rect x="306" y="530" width="200" height="42" rx="18" fill="#1e9c8d"/><text x="328" y="557" class="t label" fill="#fff">DATA TABLE v1.1</text><text x="328" y="607" class="t name" fill="#fff">Garantir ledger</text><text x="328" y="633" class="t sub" fill="#afc4dd">n8n sem planilha</text></g>
  <g filter="url(#shadow)"><rect x="560" y="530" width="200" height="130" rx="18" fill="url(#panel)" stroke="#f2be53"/><rect x="560" y="530" width="200" height="42" rx="18" fill="#dc9b25"/><text x="582" y="557" class="t label" fill="#392100">CODE v2</text><text x="582" y="607" class="t name" fill="#fff">Reservar entrega</text><text x="582" y="633" class="t sub" fill="#afc4dd">dispatchId + retry</text></g>
  <g filter="url(#shadow)"><rect x="814" y="530" width="200" height="130" rx="18" fill="url(#panel)" stroke="#40c7b2"/><rect x="814" y="530" width="200" height="42" rx="18" fill="#1e9c8d"/><text x="836" y="557" class="t label" fill="#fff">LOOP v3</text><text x="836" y="607" class="t name" fill="#fff">Uma por vez</text><text x="836" y="633" class="t sub" fill="#afc4dd">isolamento por rede</text></g>
  <g filter="url(#shadow)"><rect x="1068" y="530" width="456" height="130" rx="18" fill="url(#panel)" stroke="#6caeff"/><rect x="1068" y="530" width="456" height="42" rx="18" fill="#347fca"/><text x="1090" y="557" class="t label" fill="#fff">PREFLIGHT + SWITCH</text><text x="1090" y="607" class="t name" fill="#fff">Credencial, flag e destino por plataforma</text><text x="1090" y="633" class="t sub" fill="#afc4dd">sem configuração: bloqueia sem chamar API</text></g>

  <path class="line" d="M1100 738H1164"/><path class="line" d="M1100 820H1164"/><path class="line" d="M1100 902H1164"/>
  <g filter="url(#shadow)"><rect x="76" y="704" width="1024" height="270" rx="22" fill="#0c192b" stroke="#314d6f"/>
    <text x="104" y="741" fill="#75c6ff" class="t" font-size="15" font-weight="850" letter-spacing="1.5">PUBLICADORES DIRETOS · APIs OFICIAIS</text>
    <g transform="translate(106 768)"><rect width="214" height="150" rx="16" fill="#142941" stroke="#d85570"/><text x="22" y="34" class="t label" fill="#ff9cac">INSTAGRAM</text><text x="22" y="69" class="t name" fill="#fff">Containers</text><text x="22" y="95" class="t sub" fill="#afc4dd">carrossel → wait</text><text x="22" y="119" class="t sub" fill="#afc4dd">→ media_publish</text></g>
    <g transform="translate(344 768)"><rect width="214" height="150" rx="16" fill="#142941" stroke="#4d9ff7"/><text x="366" y="34" class="t label" fill="#8fc8ff">FACEBOOK</text><text x="366" y="69" class="t name" fill="#fff">Fotos privadas</text><text x="366" y="95" class="t sub" fill="#afc4dd">IDs reunidos →</text><text x="366" y="119" class="t sub" fill="#afc4dd">feed attached_media</text></g>
    <g transform="translate(582 768)"><rect width="214" height="150" rx="16" fill="#142941" stroke="#9a75e8"/><text x="604" y="34" class="t label" fill="#c8b5ff">LINKEDIN</text><text x="604" y="69" class="t name" fill="#fff">Upload binário</text><text x="604" y="95" class="t sub" fill="#afc4dd">URNs de imagem →</text><text x="604" y="119" class="t sub" fill="#afc4dd">post multi-imagem</text></g>
    <g transform="translate(820 768)"><rect width="214" height="150" rx="16" fill="#142941" stroke="#40c7b2"/><text x="842" y="34" class="t label" fill="#6de6d4">X / THREAD</text><text x="842" y="69" class="t name" fill="#fff">Mídia v2</text><text x="842" y="95" class="t sub" fill="#afc4dd">post nativo +</text><text x="842" y="119" class="t sub" fill="#afc4dd">até 3 respostas</text></g>
  </g>
  <g filter="url(#shadow)"><rect x="1164" y="704" width="360" height="270" rx="22" fill="#142941" stroke="#4e9fdf"/><text x="1192" y="741" fill="#75c6ff" class="t" font-size="15" font-weight="850" letter-spacing="1.5">CONFIRMAÇÃO E RECUPERAÇÃO</text><text x="1192" y="787" class="t name" fill="#fff">Registrar resultado</text><text x="1192" y="817" class="t sub" fill="#afc4dd">ID remoto · permalink</text><text x="1192" y="848" class="t sub" fill="#afc4dd">falha sanitizada · retry</text><text x="1192" y="879" class="t sub" fill="#afc4dd">3 tentativas no máximo</text><rect x="1192" y="902" width="300" height="39" rx="12" fill="#1e9c8d"/><text x="1342" y="928" text-anchor="middle" class="t label" fill="#fff">DATA TABLE · LEDGER</text></g>
  <text x="1520" y="996" text-anchor="end" fill="#7189a7" class="t" font-size="13">CANVAS SANITIZADO PARA PORTFÓLIO · SEM TOKENS, CONTAS, IDENTIFICADORES OU DADOS CORPORATIVOS</text>
</svg>
